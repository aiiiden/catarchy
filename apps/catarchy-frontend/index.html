<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Catarchy</title>
    <meta name="description" content="Catarchy" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- OG -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://catarchy.net" />
    <meta property="og:title" content="Catarchy" />
    <meta property="og:description" content="The world is meown" />
    <meta
      property="og:image"
      content="https://catarchy.net/assets/meta/og-meta.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://catarchy.net" />
    <meta name="twitter:title" content="Catarchy" />
    <meta name="twitter:description" content="The world is meown" />
    <meta
      name="twitter:image"
      content="https://catarchy.net/assets/meta/og-meta.png"
    />

    <!-- PWA -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Catarchy" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- For loading -->
    <style id="initial-style">
      @keyframes up_down {
        0% {
          transform: translateY(0%);
        }
        50% {
          transform: translateY(10%);
        }
        100% {
          transform: translateY(0);
        }
      }

      #loading-container {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        width: fit-content;
        height: fit-content;
      }

      #loading-container img {
        display: block;
        animation: up_down 2s both infinite;
        animation-timing-function: steps(4, end);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-container">
        <img
          fetchpriority="high"
          id="initial-loading-bastet"
          src="/assets/loading/bastet.svg"
          alt="Loading..."
          width="72"
          height="56"
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
