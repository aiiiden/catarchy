name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (frontend)
        run: bun run lint
        working-directory: apps/catarchy-frontend

      - name: Lint (backend)
        run: bun run lint
        working-directory: apps/catarchy-backend
